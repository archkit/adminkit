name: npm publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) には npm >= 11.5.1 が必要（Node22 同梱は 10 系）
      - run: npm install -g npm@latest
      - run: npm ci
      - name: タグからバージョンを設定
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
      - run: npm run build
      # トークン不要: OIDC で認証し provenance も自動付与される
      - run: npm publish --access public
